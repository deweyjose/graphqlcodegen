name: E2E Example

# End-to-end integration test: builds the graphqlcodegen-example multi-module
# project (pinned as a submodule under examples/) against the plugin built from
# THIS commit, proving the generated sources actually compile and run against
# DGS + Spring Boot. The example's runtime stack lives entirely in its own,
# separate Maven build and never enters the plugin's build (enforced by the
# maven-enforcer ban-spring-boot rule that runs during the plugin install below).

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*.*'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with example submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Build + install the plugin from source into the local ~/.m2 so the example
      # resolves the just-built artifact instead of Maven Central. The enforcer
      # 'ban-spring-boot' rule runs here, failing the job if Spring Boot ever leaks
      # into the plugin's own dependency graph.
      - name: Build & install plugin from source
        run: ./mvnw -B -ntp install -DskipTests

      - name: Resolve plugin version
        id: plugin
        run: |
          VERSION=$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Testing example against plugin version: $VERSION"

      # Serve the pinned schema locally so the `server` module's <schemaUrls> codegen
      # has no external network dependency and uses the schema from the tested commit.
      - name: Serve example schema locally
        working-directory: examples/graphqlcodegen-example/server/src/main/resources/schema
        run: |
          nohup python3 -m http.server 8000 > /tmp/schema-http.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/main.graphqls > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:8000/main.graphqls | head -1

      - name: Install example parent POM
        working-directory: examples/graphqlcodegen-example
        run: mvn -B -ntp -N install

      # common (jar-embedded schema) -> server (local + remote + jar schema) -> client
      # (client API generation). server's remote schema URL is overridden to the local
      # server above; the plugin version is overridden to the build-from-source artifact.
      - name: Build common, server, client
        working-directory: examples/graphqlcodegen-example
        run: |
          mvn -B -ntp install -pl common,server,client \
            -Dgraphql-codegen-plugin.version=${{ steps.plugin.outputs.version }} \
            -Dcodegen.server.schemaUrl=http://localhost:8000/main.graphqls

      # client-introspection generates from LIVE introspection, so the server must be up.
      - name: Start DGS server
        working-directory: examples/graphqlcodegen-example
        run: |
          nohup mvn -B -ntp -pl server spring-boot:run > /tmp/server.log 2>&1 &
          echo "Waiting for http://localhost:8080/graphql ..."
          for i in $(seq 1 60); do
            if curl -sf -X POST http://localhost:8080/graphql \
                 -H 'Content-Type: application/json' \
                 -d '{"query":"{__typename}"}' > /dev/null; then
              echo "Server is up."
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready in time:"; tail -50 /tmp/server.log; exit 1

      - name: Build client-introspection (live introspection)
        working-directory: examples/graphqlcodegen-example
        run: |
          mvn -B -ntp install -pl client-introspection \
            -Dgraphql-codegen-plugin.version=${{ steps.plugin.outputs.version }}

      - name: Server log (on failure)
        if: failure()
        run: tail -100 /tmp/server.log 2>/dev/null || true
