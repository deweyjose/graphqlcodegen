name: Java CI with JaCoCo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Serve the in-repo schema for the `server` module's codegen (no network dependency).
      - name: Serve example schema locally
        working-directory: examples/graphqlcodegen-example/server/src/main/resources/schema
        run: |
          nohup python3 -m http.server 8000 > /tmp/schema-http.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/main.graphqls > /dev/null && break
            sleep 1
          done

      # Coverage of the plugin's classes from BOTH sources:
      #   - unit tests (Surefire) -> jacoco.exec
      #   - the Codegen Mojo running during the example reactor build, captured by a JaCoCo
      #     agent on the Maven JVM -> jacoco-it.exec
      # Then merge the two and report (jacoco:merge@merge-all + jacoco:report@report-merged).
      - name: Build with Maven (unit + example-driven coverage)
        run: |
          AGENT=$(find ~/.m2 -name 'org.jacoco.agent-*-runtime.jar' | sort | tail -1)
          MAVEN_OPTS="-javaagent:${AGENT}=destfile=$PWD/graphqlcodegen-maven-plugin/target/jacoco-it.exec,append=true,includes=io.github.deweyjose.graphqlcodegen.*" \
            mvn -B -ntp clean install -Dcodegen.server.schemaUrl=http://localhost:8000/main.graphqls
          mvn -B -ntp -pl graphqlcodegen-maven-plugin \
            org.jacoco:jacoco-maven-plugin:0.8.14:merge@merge-all \
            org.jacoco:jacoco-maven-plugin:0.8.14:report@report-merged

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: graphqlcodegen-maven-plugin/target/site/jacoco
      
      - name: JaCoCo Report
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: graphqlcodegen-maven-plugin/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 90
          update-comment: true
          title: Code Coverage Report
          
      - name: Generate Coverage Badge        
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: graphqlcodegen-maven-plugin/target/site/jacoco/jacoco.csv
          badges-directory: badges

      - name: Commit and push coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/*.svg
          git commit -m "Update coverage badge" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy JaCoCo report to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./graphqlcodegen-maven-plugin/target/site/jacoco
          publish_branch: gh-pages

permissions:
  contents: write
  pull-requests: write